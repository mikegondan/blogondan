<ng-container *ngIf="post$ | async as post; else loading">
  <article class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-20 lg:py-24 animate-fade-in">
    <!-- Header -->
    <header class="mb-10 text-center">
      <div class="flex items-center justify-center gap-3 text-sm text-gray-500 mb-6 font-medium tracking-wide uppercase">
        <span class="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">{{ post.category }}</span>
        <span>•</span>
        <time [attr.datetime]="post.createdAt">{{ post.createdAt | date:'longDate' }}</time>
        <span>•</span>
        <span>{{ post.readTime }} lectura</span>
      </div>
      
      <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-gray-900 tracking-tight mb-8 leading-tight">
        {{ post.title }}
      </h1>
      
      <p class="text-xl sm:text-2xl text-gray-500 leading-relaxed max-w-2xl mx-auto mb-10">
        {{ post.excerpt }}
      </p>
    </header>

    <!-- Cover Image -->
    <div class="mb-16 rounded-2xl overflow-hidden shadow-2xl relative">
      <div class="aspect-w-16 aspect-h-9">
        <img [src]="post.image" [alt]="post.title" class="w-full h-full object-cover">
      </div>
      <!-- Optional Gradient Overlay -->
      <div class="absolute inset-0 bg-gradient-to-t from-gray-900/20 to-transparent mix-blend-multiply"></div>
    </div>

    <!-- Content (WYSIWYG) -->
    <div class="prose prose-lg sm:prose-xl lg:prose-2xl prose-indigo mx-auto text-gray-800" [innerHTML]="post.content">
    </div>
    
    <!-- Footer Back Link -->
    <footer class="mt-20 pt-10 border-t border-gray-100 flex justify-center">
       <a routerLink="/" class="inline-flex items-center gap-2 text-indigo-600 hover:text-indigo-800 font-semibold transition-colors duration-200">
         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
         Volver al inicio
       </a>
    </footer>
  </article>
</ng-container>

<ng-template #loading>
  <div class="flex flex-col justify-center items-center min-h-[50vh] text-gray-400 gap-4">
    <!-- Spinner -->
    <svg class="animate-spin h-10 w-10 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <p class="font-medium animate-pulse">Cargando artículo...</p>
  </div>
</ng-template>
