<header class="header relative">
  <div class="header-container flex flex-wrap items-center justify-between mx-auto py-4 px-6 max-w-7xl">
    <a routerLink="/" class="logo flex items-center gap-2">
      <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="m-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--angular-red)" />
            <stop offset="50%" stop-color="var(--angular-pink)" />
            <stop offset="100%" stop-color="var(--angular-violet)" />
          </linearGradient>
        </defs>
        <!-- Hexagon base -->
        <path d="M50 5 L93 25 L85 75 L50 95 L15 75 L7 25 Z" fill="url(#m-gradient)"/>
        <!-- Inner M -->
        <path d="M28 70 L28 35 L50 55 L72 35 L72 70 L60 70 L60 48 L50 60 L40 48 L40 70 Z" fill="#FFFFFF"/>
      </svg>
      <span class="logo-text font-bold text-2xl tracking-tight text-gray-900">mBlog</span>
    </a>
    
    <div class="flex items-center gap-6">
      <nav class="nav-links hidden md:flex gap-6 font-medium text-gray-600">
        <a routerLink="/" class="hover:text-indigo-600 transition-colors">Inicio</a>
        <a href="#" class="hover:text-indigo-600 transition-colors">Artículos</a>
        <a routerLink="/about" class="hover:text-indigo-600 transition-colors">Sobre mí</a>
      </nav>

      <!-- Divisor -->
      <div class="hidden md:block w-px h-6 bg-gray-200"></div>

      <!-- Auth Section -->
      <ng-container *ngIf="user$ | async as user; else loginButton">
        <!-- Avatar / User Menu -->
        <div class="relative">
          <button (click)="toggleDropdown()" class="flex focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 rounded-full transition-shadow">
            <img [src]="user.photoURL || 'https://via.placeholder.com/40'" referrerpolicy="no-referrer" alt="Foto de Perfil" class="w-10 h-10 rounded-full border border-gray-200 object-cover shadow-sm hover:shadow-md transition-shadow">
          </button>

          <!-- Dropdown -->
          <div *ngIf="isDropdownOpen()" class="absolute right-0 mt-3 w-56 bg-white rounded-2xl shadow-xl border border-gray-100 z-50 transform opacity-100 scale-100 transition-all origin-top-right">
            <!-- Speech bubble arrow -->
            <div class="absolute -top-2 right-3 w-4 h-4 bg-white border-t border-l border-gray-100 transform rotate-45"></div>
            
            <div class="p-4 relative bg-white rounded-2xl">
              <div class="flex flex-col mb-4 pb-4 border-b border-gray-50">
                <span class="font-semibold text-gray-800 truncate">{{ user.displayName }}</span>
                <span class="text-xs text-gray-500 truncate">{{ user.email }}</span>
              </div>
              
              <div class="flex flex-col gap-1">
                <a routerLink="/admin" (click)="toggleDropdown()" class="flex items-center gap-2 px-3 py-2 text-sm text-gray-700 font-medium rounded-lg hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                  Administración
                </a>
                <button (click)="logout()" class="flex items-center gap-2 px-3 py-2 text-sm text-red-600 font-medium rounded-lg hover:bg-red-50 text-left transition-colors w-full">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                  Cerrar Sesión
                </button>
              </div>
            </div>
          </div>
        </div>
      </ng-container>

      <ng-template #loginButton>
        <button (click)="loginWithGoogle()" class="flex items-center gap-2 bg-gradient-to-r from-gray-800 to-gray-900 hover:from-gray-700 hover:to-gray-800 text-white px-5 py-2.5 rounded-full font-medium transition-all shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 text-sm">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.187 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg>
          Iniciar sesión
        </button>
      </ng-template>

    </div>
  </div>
</header>
